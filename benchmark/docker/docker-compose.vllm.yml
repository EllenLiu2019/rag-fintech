# ==============================================================================
# vLLM deployment for AWS EC2 GPU instance
# ==============================================================================

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-server
    restart: unless-stopped
    # vLLM container runs as root (default). Cannot use `user: 1000` because
    # PyTorch calls getpass.getuser() which requires a /etc/passwd entry.
    ports:
      - "8000:8000"
    volumes:

      # Bind-mount the entire cache dir so both Hugging Face and vLLM caches persist.
      # - HF cache: /root/.cache/huggingface (model weights from Hub)
      # - vLLM cache: /root/.cache/vllm (VLLM_CACHE_ROOT, assets; without this, vLLM
      #   re-downloads/prepares the model on every container restart)
      # Stored on /data (232 GB nvme1n1), not on the 30 GB root volume.
      - /data/cache:/root/.cache
    environment:
      - HF_HOME=/root/.cache/huggingface
      - VLLM_CACHE_ROOT=/root/.cache/vllm
      # Optional: set API key for authentication (recommended when exposed to public)
      # - VLLM_API_KEY=${VLLM_API_KEY:-}
    command: >
      --model Qwen/Qwen3-8B
      --port 8000
      --max-model-len 8500
      --gpu-memory-utilization 0.90
      --dtype bfloat16
      --kv-cache-dtype fp8
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s  # vLLM model loading takes time