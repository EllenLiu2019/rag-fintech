apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: production
  labels:
    app.kubernetes.io/name: rag-fintech
    app.kubernetes.io/component: api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-fintech
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: acr-secret
      nodeSelector:
        aliyun.accelerator/xpu_type: nvidia
      containers:
        - name: api
          image: ${IMAGE_REGISTRY}/rag-fintech:${IMAGE_TAG}
          imagePullPolicy: Always
          command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8001"]
          ports:
            - containerPort: 8001
              protocol: TCP
          envFrom:
            - secretRef:
                name: rag-fintech-secrets
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: LANGSMITH_TRACING
              value: "true"
            - name: LANGSMITH_ENDPOINT
              value: "https://api.smith.langchain.com"
            - name: LANGSMITH_PROJECT
              value: "rag-fintech"
            - name: HF_HOME
              value: "/app/.cache/huggingface"
            - name: HF_ENDPOINT
              value: "https://hf-mirror.com"
          volumeMounts:
            - name: config-volume
              mountPath: /app/conf/service_conf.yaml
              subPath: service_conf.yaml
            - name: hf-cache
              mountPath: /app/.cache/huggingface
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: 3072
              nvidia.com/gpucores: 15
            limits:
              cpu: "1000m"
              memory: "6Gi"
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: 3072
              nvidia.com/gpucores: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 20    # 30s + 20×15s = up to 5.5min for first-time model download
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 5
      volumes:
        - name: config-volume
          configMap:
            name: rag-fintech-config
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-model-cache

---
apiVersion: v1
kind: Service
metadata:
  name: rag-api
  namespace: production
  labels:
    app.kubernetes.io/name: rag-fintech
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: api
  ports:
    - port: 8001
      targetPort: 8001
      protocol: TCP
