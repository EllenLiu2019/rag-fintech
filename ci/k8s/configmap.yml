apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-fintech-config
  namespace: production
  labels:
    app.kubernetes.io/name: rag-fintech
data:
  # service_conf.yaml -- mounted as /app/conf/service_conf.yaml
  # Environment variables (e.g. ${RAG_RDB_PASSWORD}) are resolved at runtime
  service_conf.yaml: |
    milvus:
      host: https://in03-f663856b627ed8e.serverless.aws-eu-central-1.cloud.zilliz.com
      token: ${RAG_MILVUS_TOKEN}

    postgresql:
      host: 34.220.231.206
      port: 5432
      username: rag
      password: ${RAG_RDB_PASSWORD}
      database: rag_fintech
      pool_size: 5
      max_overflow: 10
      sslmode: disable

    redis:
      host: redis-10680.c10.us-east-1-2.ec2.cloud.redislabs.com
      port: 10680
      decode_responses: False
      username: default
      password: ${RAG_REDIS_PASSWORD}
      queue_name: ingestion
      enable: True

    neo4j:
      uri: neo4j://34.238.34.249:7687
      username: neo4j
      password: ${NEO4J_PASSWORD}
      database: neo4j

    schema_path: rag/ingestion/extractor/schema/insurance.json
