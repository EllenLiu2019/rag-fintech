apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-fintech-config
  namespace: production
  labels:
    app.kubernetes.io/name: rag-fintech
data:
  # service_conf.yaml -- mounted as /app/conf/service_conf.yaml
  service_conf.yaml: |
    milvus:
      host: http://milvus.production.svc.cluster.local:19530
      token: ${RAG_MILVUS_TOKEN}

    postgresql:
      host: 10.70.247.90
      port: 5432
      username: rag
      password: ${RAG_RDB_PASSWORD}
      database: rag_fintech
      pool_size: 5
      max_overflow: 10
      sslmode: disable

    redis:
      host: 10.70.247.90
      port: 6379
      decode_responses: False
      password: ${RAG_REDIS_PASSWORD}
      queue_name: ingestion
      enable: True

    neo4j:
      uri: neo4j://10.70.247.90:7687
      username: neo4j
      password: ${NEO4J_PASSWORD}
      database: neo4j

    storage:
      provider: oss
      bucket: rag-fintech
      endpoint: https://oss-cn-hangzhou-internal.aliyuncs.com
      access_key_id: ${OSS_ACCESS_KEY_ID}
      access_key_secret: ${OSS_ACCESS_KEY_SECRET}
      prefix: rag-fintech

    schema_path: rag/ingestion/extractor/schema/insurance.json

    ingestion:
      extractor_model: qwen_9B
      claim_extraction: qa_reasoner
    graph:
      extractor: qa_reasoner
    search:
      query_optimizer: qwen_9B
      foc_retriever: qwen_35B
    chat:
      llm_service: qa_reasoner
    claim:
      medical_agent: qa_reasoner
      foc_retriever: qa_reasoner
      eligibility_reasoner: qa_reasoner