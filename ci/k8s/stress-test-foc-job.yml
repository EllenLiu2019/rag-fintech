apiVersion: batch/v1
kind: CronJob
metadata:
  name: stress-test-foc
  namespace: production
  labels:
    app.kubernetes.io/name: rag-fintech
    app.kubernetes.io/component: stress-test-foc
spec:
  schedule: "0 0 31 2 *"
  suspend: true
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/component: stress-test-foc
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: acr-secret
          containers:
            - name: stress
              image: ${IMAGE_REGISTRY}/rag-fintech:${IMAGE_TAG}
              imagePullPolicy: Always
              command:
                - python
                - -m
                - benchmark.stress_test_rag
                - --base-url
                - http://rag-api.production.svc.cluster.local:8001
                - --levels
                - "1"
                - "2"
                - "3"
                - "4"
                - --rounds
                - "3"
                - --question-type
                - logic
                - --doc-id
                - policy_0308125419_88c9d1
                - --output
                - /results/stress_foc.csv
              volumeMounts:
                - name: results
                  mountPath: /results
              resources:
                requests:
                  cpu: "500m"
                  memory: "512Mi"
                limits:
                  cpu: "2000m"
                  memory: "1Gi"
          volumes:
            - name: results
              emptyDir: {}
