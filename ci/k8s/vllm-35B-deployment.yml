apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-35
  namespace: production
  labels:
    app.kubernetes.io/name: rag-fintech
    app.kubernetes.io/component: vllm-35b
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: vllm-35b
  template:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
        prometheus.io/scrape: "true"
      labels:
        app.kubernetes.io/name: rag-fintech
        app.kubernetes.io/component: vllm-35b
    spec:
      terminationGracePeriodSeconds: 60
      imagePullSecrets:
        - name: acr-secret
      nodeSelector:
        aliyun.accelerator/xpu_type: nvidia
      containers:
        - name: vllm
          image: ${IMAGE_REGISTRY}/vllm:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          args:
            - --model
            - Qwen/Qwen3.5-35B-A3B-FP8
            - --port
            - "8000"
            - --max-num-batched-tokens
            - "8192"
            - --max-model-len
            - "15000"
            - --gpu-memory-utilization
            - "0.95"
            - --dtype
            - auto
            - --max-num-seqs
            - "20"
            - --enable_prefix_caching
          env:
            - name: HF_HOME
              value: "/models"
            - name: HF_ENDPOINT
              value: "https://hf-mirror.com"
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: "0"
            - name: VLLM_LOGGING_LEVEL
              value: "INFO"
          volumeMounts:
            - name: hf-cache
              mountPath: /models
          resources:
            requests:
              cpu: "3"
              memory: "30Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "6"
              memory: "60Gi"
              nvidia.com/gpu: "1"
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 120
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-model-cache

---
apiVersion: v1
kind: Service
metadata:
  name: vllm-35-svc
  namespace: production
  labels:
    app.kubernetes.io/name: rag-fintech
    app.kubernetes.io/component: vllm-35b
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: vllm-35b
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
