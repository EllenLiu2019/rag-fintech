apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: production
  labels:
    app.kubernetes.io/name: rag-fintech
    app.kubernetes.io/component: vllm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: vllm
  template:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
        prometheus.io/scrape: "true"
      labels:
        app.kubernetes.io/name: rag-fintech
        app.kubernetes.io/component: vllm
    spec:
      terminationGracePeriodSeconds: 60
      imagePullSecrets:
        - name: acr-secret
      nodeSelector:
        aliyun.accelerator/xpu_type: nvidia
      containers:
        - name: vllm
          image: ${IMAGE_REGISTRY}/vllm:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          args:
            - --model
            - Qwen/Qwen3.5-9B
            - --port
            - "8000"
            - --max-model-len
            - "8192"
            - --gpu-memory-utilization
            - "0.95"
            - --dtype
            - auto
            - --max-num-seqs
            - "16"
          env:
            - name: HF_HOME
              value: "/models"
            - name: HF_ENDPOINT
              value: "https://hf-mirror.com"
            - name: VLLM_LOGGING_LEVEL
              value: "INFO"
          volumeMounts:
            - name: hf-cache
              mountPath: /models
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: 23552
              nvidia.com/gpucores: 95  
            limits:
              cpu: "5"
              memory: "24Gi"
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: 23552
              nvidia.com/gpucores: 95  
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 120
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-model-cache

---
apiVersion: v1
kind: Service
metadata:
  name: vllm-svc
  namespace: production
  labels:
    app.kubernetes.io/name: rag-fintech
    app.kubernetes.io/component: vllm
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: vllm
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
