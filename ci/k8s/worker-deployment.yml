apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-worker
  namespace: production
  labels:
    app.kubernetes.io/name: rag-fintech
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-fintech
        app.kubernetes.io/component: worker
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: worker
          image: ${IMAGE_REGISTRY}/rag-fintech:${IMAGE_TAG}
          imagePullPolicy: Always
          command: ["python", "api/worker.py"]
          envFrom:
            - secretRef:
                name: rag-fintech-secrets
            - configMapRef:
                name: rag-fintech-config
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: RQ_WORKER_CLASS
              value: "fork"
            - name: LANGSMITH_TRACING
              value: "true"
            - name: LANGSMITH_ENDPOINT
              value: "https://api.smith.langchain.com"
            - name: LANGSMITH_PROJECT
              value: "rag-fintech"
          volumeMounts:
            - name: config-volume
              mountPath: /app/conf/service_conf.yaml
              subPath: service_conf.yaml
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
      volumes:
        - name: config-volume
          configMap:
            name: rag-fintech-config
