apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-worker
  namespace: production
  labels:
    app.kubernetes.io/name: rag-fintech
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-fintech
        app.kubernetes.io/component: worker
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: worker
          image: ${IMAGE_REGISTRY}/rag-fintech:${IMAGE_TAG}
          imagePullPolicy: Always
          command: ["python", "api/worker.py"]
          envFrom:
            - secretRef:
                name: rag-fintech-secrets
            - configMapRef:
                name: rag-fintech-config
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: RQ_WORKER_CLASS
              value: "fork"
            - name: LANGSMITH_TRACING
              value: "true"
            - name: LANGSMITH_ENDPOINT
              value: "https://api.smith.langchain.com"
            - name: LANGSMITH_PROJECT
              value: "rag-fintech"
            - name: HF_HOME
              value: "/app/.cache/huggingface"
            - name: HF_ENDPOINT
              value: "https://hf-mirror.com"
          volumeMounts:
            - name: config-volume
              mountPath: /app/conf/service_conf.yaml
              subPath: service_conf.yaml
            - name: hf-cache
              mountPath: /app/.cache/huggingface
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "3Gi"
      volumes:
        - name: config-volume
          configMap:
            name: rag-fintech-config
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-model-cache
