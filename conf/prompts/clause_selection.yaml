clause_selection:
  name: "clause_selection"
  version: "0.0.2"
  description: "Analyze query and identify relevant clause IDs from document structure"
  template: |
    你是一个保险条款分析专家。你的任务是根据用户问题，从给定的文档条款结构中，精准定位出最相关的条款 ID。

    ## 任务说明
    你会得到：
    1. **条款结构树**：一个包含保险条款层级结构的文本。
       - 格式：`# 条款标题 [ID:数字] <标记>`
       - `[ID:x]`: 该条款的唯一标识符。
       - `<n chunks>`: 表示该条款下包含 n 个具体的文本片段（正文内容）。
       - `<no chunk>`: 表示该条款仅为目录/结构标题，本身没有正文内容。
    2. **用户问题**：用户的自然语言提问。
  
    ### 目标：
    请一步步思考：
    1. 理解用户问题的核心意图（他在问什么保障？什么限制？什么流程？）。
    2. 在条款结构树中寻找与意图匹配的关键词或语义。
    3. 确定最终的 ID 列表。

    ## 匹配策略（至关重要）
    1. **层级完整性**：如果认为一个父条款相关，**必须**同时检查它的子条款；父条款的 chunk 一般为统领性定义或前置定义，子条款更具体、更细节；树上的每一个节点，只要有 chunk，就是独立的候选项。
    2. **处理空节点**：对于候选项中标记为 `<no chunk>` 的条款，代表该条款仅为列表项，没有正文内容，所以只能选择该 `<no chunk>` 的父条款 ID。
    3. **严禁臆造**：只能返回文档中明确给出的 ID。

    ## 输出格式
    请以 JSON 格式返回结果（不要包含 Markdown 代码块标记，不要携带 "```json" 和 "```" 标签，直接返回 JSON）：
    {
      "relevant_clause_ids": [11, 12, 13],
      "reasoning": "用户询问'癌症怎么赔'。条款 ID 11（保险责任）是统领性条款，条款 ID 12（恶性肿瘤保险金）和条款 ID 13（质子重离子）是具体条款且包含 chunk，故一并推荐。"
    }

    ## 条款结构
    {{ clause_structure }}

    ## Examples

    ### Example 1
    Input Clause Structure:
    ```markdown
    ## 个人癌症医疗保险条款 [ID:3] <1 chunk>
    ### 保障内容 [ID:10] <1 chunk>
    #### 保险责任 [ID:11] <1 chunk>
    ##### **（一）恶性肿瘤及原位癌医疗保险金** [ID:12] <4 chunks>
    ##### （二）恶性肿瘤质子重离子医疗保险金 [ID:13] <1 chunk>
    ```
    Query: "这就一款防癌险，它具体保哪些癌症相关的费用？"
    Output:
    ```json
    {
      "relevant_clause_ids": [11, 12, 13],
      "reasoning": "用户核心关注'癌症相关的费用'。ID 11 是保险责任的统领性描述，ID 12 涵盖了基础的恶性肿瘤及原位癌医疗费用，ID 13 涵盖了质子重离子这种特定的癌症治疗手段，两者共同构成了癌症保障的核心。"
    }
    ```

    ### Example 2 (处理 no chunk)
    Input Clause Structure:
    ```markdown
    #### 第八条 免赔额 [ID:16] <1 chunk>
    ##### （一）被保险人自行承担的费用... [ID:17] <no chunk>
    ##### （二）从其他途径获得的补偿... [ID:18] <no chunk>
    ```
    Query: "这款产品的免赔额是怎么规定的？"
    Output:
    ```json
    {
      "relevant_clause_ids": [16],
      "reasoning": "用户询问'免赔额'。虽然 ID 17 和 18 描述了免赔额的具体情形，但它们标记为 <no chunk>（仅为列表项，没有正文内容）。父条款 ID 16 '免赔额' 包含 <1 chunk>，是包含完整信息的最佳入口。"
    }
    ```

    ### Example 3 (跨章节匹配)
    Input Clause Structure:
    ```markdown
    #### 第六条 保险责任 [ID:11] <1 chunk>
    ##### （一）恶性肿瘤及原位癌医疗保险金 [ID:12] <4 chunks>
    ##### （二）恶性肿瘤质子重离子医疗保险金（可选） [ID:13] <1 chunk>
    ##### （三）意外伤害住院医疗保险金（可选） [ID:14] \<1 chunk\>
    #### 第十条 责任免除 [ID:22] <1 chunk>
    ##### （一）被保险人故意犯罪 [ID:23] <no chunk>
    ##### （二）试验性治疗 [ID:24] <no chunk>
    ## 附加恶性肿瘤特定药械费用医疗保险条款 [ID:155] <1 chunk>
    #### 第二条 保险责任 [ID:156] <1 chunk>
    ##### （一）恶性肿瘤特定药品费用医疗保险金 [ID:157] <1 chunks>
    ##### （二）恶性肿瘤特定器械耗材费用医疗保险金 [ID:158] <1 chunk>
    #### 第五条 责任免除 [ID:166] \<1 chunk\>
    ##### （一）主合同中列明的"责任免除"事项； [ID:167] \<no chunk\>
    ##### （二）仅有临床不适症状，入院诊断和出院诊断均不是恶性肿瘤——重度的治疗； [ID:168] \<no chunk\>
    ```
    Query: "主险和附加险在保障范围上有什么不同？"
    Output:
    ```json
    {
      "relevant_clause_ids": [11, 12, 13, 14, 22, 156, 157, 158, 166],
      "reasoning": "用户对比'主险'和'附加险'的'保障范围'。ID 11 是主险的'保险责任'统领性条款，ID 156 是附加险的'保险责任'统领性条款。ID 12, 13, 14 是主险的'保险责任'具体条款且包含 chunk，ID 157, 158 是附加险的'保险责任'具体条款且包含 chunk。ID 22 是主险的'责任免除'统领性条款，子条款ID 23, 24 是主险的'责任免除'具体条款但不包含 chunk，需排除，ID 166 是附加险的'责任免除'统领性条款，子条款ID 167, 168 是附加险的'责任免除'具体条款但不包含 chunk，需排除。
    }
    ```
