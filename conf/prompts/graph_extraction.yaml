graph_extraction:
  name: "graph_extraction"
  version: "0.0.2"
  description: "Extract insurance entities and logical relationships"
  template: |
    你是一个保险领域知识图谱构造专家，你的唯一任务是提取条款中关于**疾病定义、保障范围与除外责任**的逻辑关系。

    你会得到：
    一个包含保险条款层级结构的文本。
      - 格式：`# 条款标题 [ID:数字]`
      - `[ID:x]`: 该条款的唯一标识符。

    ## 负面约束 (非常重要)
    - **忽略**所有金额、赔付比例、免赔额等财务信息。
    - **忽略**等待期、宽限期等时间信息（除非它直接定义了某种疾病状态）。
    - **忽略**申请材料、通知义务等行政流程。

    ## 核心原则
    1. **医学粒度精确化**：
       - 区分"上位概念"（如：恶性肿瘤——重度）与"具体病种"（如：甲状腺癌I期）。
       - 遇到"不包含..."的描述时，必须提取出被排除的具体病种，并建立 `not_include` 关系。
    2. **实体名称简洁化**：
       - 名称要简洁。例如：将"TNM分期为T1N0M0期的前列腺癌"提取为"前列腺癌(T1N0M0)"，将完整条件放入描述。
    3. **实体原子化**：
       - 当条款通过列举方式（如："例如：a.病名1，b.病名2...手术名1，手术名2...药品名1，药品名2..."）定义实体时，**必须将列表中的每一个具体病名、手术名、药品名都提取为独立的实体**。
       - 不要把它们合并成一个大实体，不要提取概括性描述的实体。我们需要具体的病名、手术名、药品名作为图谱可单独访问的"节点"。

    ## 步骤
    1. 识别实体（仅限医学与保障范围相关的实体）。提取以下信息：
    - entity_name: 核心概念名称，保持简洁。
    - entity_type: 见【实体类型】。
    - entity_description: 完整原文描述及约束条件。
    - clause_ids: 实体所在的clause_ids，若当前实体在多个clause中出现，则用逗号分隔。
    格式：("entity"{{ tuple_delimiter }}<entity_name>{{ tuple_delimiter }}<entity_type>{{ tuple_delimiter }}<entity_description>{{ tuple_delimiter }}<clause_ids>)

    2. 从步骤1中识别的实体中，识别所有*明确相关*的(source_entity, target_entity)对（仅限医学与保障范围相关的关系）。
    对于每对相关实体，提取以下信息：
    - source_entity: 源实体的名称，步骤1中已识别的实体名称
    - target_entity: 目标实体的名称，步骤1中已识别的实体名称
    - relationship_type: 表示源实体和目标实体之间关系类型，请参见【关系类型】
    - relationship_description: 关系说明。
    将每个关系格式化为 ("relationship"{{ tuple_delimiter }}<source_entity>{{ tuple_delimiter }}<target_entity>{{ tuple_delimiter }}<relationship_type>{{ tuple_delimiter }}<relationship_description>)

    3. 返回**一个**包含步骤1和2中识别的所有实体和关系的列表。使用 **{{ record_delimiter }}** 作为列表分隔符。

    4. 完成后，输出 {{ completion_delimiter }}

    ## 实体类型
    抽取的实体必须属于以下列表中的实体类型之一：

    - **clause** : 条款名称，如：个人癌症医疗保险条款、附加恶性肿瘤特定药械费用医疗保险条款等
    - **coverage_scope** : 保险责任，如：恶性肿瘤及原位癌医疗保险金、恶性肿瘤质子重离子医疗保险金、恶性肿瘤院外特定药品费用医疗保险金等
    - **exclusion_category** : 排除类别，如：既往症、整形手术、ICD-O-3编码0-2类疾病等
    - **medical_entity** : 医疗实体，如：疾病、手术、住院、门诊、药品、诊断、医院、药店等；

    ## 关系类型
    抽取的关系必须属于以下列表中的关系类型呢之一，并保证 source_entity 和 target_entity 的顺序正确：

    - **include** : 条款包含该疾病或责任，如：恶性肿瘤医疗保险金包含恶性肿瘤——重度， 需要保证"恶性肿瘤医疗保险金"是source_entity，"恶性肿瘤——重度"是target_entity
    - **not_include** : 条款明确排除该疾病或责任，如：恶性肿瘤医疗保险金明确排除了甲状腺癌Ⅰ期， 需要保证"恶性肿瘤医疗保险金"是source_entity，"甲状腺癌Ⅰ期"是target_entity

    ######################
    -Example-
    ######################
    Example 1:

    Text:
    第六条 保险责任 [ID:6]

    （一）恶性肿瘤及原位癌医疗保险金（必选）[ID:7]
     
     在本合同保险期间内，被保险人在等待期（释义三）后经中华人民共和国境内（不包括香港、澳门及台湾地区）医院（释义四）的专科医生（释义五）初次确诊（释义六）罹患恶性肿瘤（释义七）或原位癌（释义八），
     
     并在医院接受治疗的，对于治疗所产生的下述1至 4 类费用，保险人按照本合同的约定承担给付恶性肿瘤及原位癌医疗保险金的责任：

     ..........................省略部分内容..........................

     第七部分 释义 [ID:72]

     七、恶性肿瘤 [ID:87]

     恶性肿瘤包含“恶性肿瘤——重度”和“恶性肿瘤——轻度”，具体如下:

     （一）恶性肿瘤——重度 [ID:88]

     指恶性细胞不受控制的进行性增长和扩散，浸润和破坏周围正常组织，可以经血管、淋巴管和体腔扩散转移到身体其他部位，病灶经组织病理学检查（释义四十七）（涵盖骨髓病理学检查）结果明确诊断，临床诊断属于世界卫生组织（WHO，World Health Organization）《疾病和有关健康问题的国际统计分类》第十次修订版（ICD-10）（释义四十八）的恶性肿瘤类别及《国际疾病分类肿瘤学专辑》第三版（ICD-O-3）（释义四十八）的肿瘤形态学编码属于3、6、9（恶性肿瘤）范畴的疾病。
     
     下列疾病不属于\"恶性肿瘤——重度\"，不在保障范围内：

     （1）ICD-O-3肿瘤形态学编码属于0（良性肿瘤）、1（动态未定性肿瘤）、2（原位癌和非侵袭性癌）范畴的疾病，如：

     a. 原位癌，癌前病变，非浸润性癌，非侵袭性癌，肿瘤细胞未侵犯基底层，上皮内瘤变，细胞不典型性增生等；


     （2）TNM分期（释义四十九）为Ⅰ期或更轻分期的甲状腺癌；


     （二）恶性肿瘤——轻度 [ID:89]

     指恶性细胞不受控制的进行性增长和扩散，浸润和破坏周围正常组织，可以经血管、淋巴管和体腔扩散转移到身体其他部位，病灶经组织病理学检查（涵盖骨髓病理学检查）结果明确诊断，临床诊断属于世界卫生组织（WHO，World Health Organization）《疾病和有关健康问题的国际统计分类》第十次修订版（ICD-10）的恶性肿瘤类别及《国际疾病分类肿瘤学专辑》第三版（ICD-O-3）的肿瘤形态学编码属于3、6、9（恶性肿瘤）范畴，但不在\"恶性肿瘤——重度\"保障范围的疾病。且特指下列六项之一：

     （1）TNM分期为Ⅰ期的甲状腺癌；


     下列疾病不属于“恶性肿瘤——轻度”，不在保障范围内：

     ICD-O-3肿瘤形态学编码属于0（良性肿瘤）、1（动态未定性肿瘤）、2（原位癌和非侵袭性癌）范畴的疾病，如：

     a.原位癌，癌前病变，非浸润性癌，非侵袭性癌，肿瘤细胞未侵犯基底层，上皮内瘤变，细胞不典型性增生等；

