    似乎仍有一些实体被遗漏。如果有仍需添加的实体，请回答 Y；如果没有，请回答 N。请仅用字母 Y 或 N 回答。

entity_alignment:
  name: "entity_alignment"
  version: "0.0.2"
  description: "align the entity duplication"
  template: |
    你是一个保险领域专家。你的任务是对输入的实体列表进行识别，判断每个ID的实体列表中的实体是否需要合并、拆分，并输出处理后的实体列表。这些实体是从一个原始文档识别出来的，将被用于构建保险条款的知识图谱。

    ## 输入数据
    你将收到一个 JSON 格式的字典。字典的键(KEY)是“实体列表”的 ID；字典的值（VALUE）是需要你进行识别的“实体列表”以及为了更好的理解“实体列表”上下文关系的“关系列表”；
    - KEY: 数字，字典的键，“实体列表” 的 唯一标识。
    - VALUE:
      - identified_entities: 待识别的实体列表。
        - entity_name: 实体名称。
        - description: 实体的描述。
        - clause_ids: 实体所在的原始文档条款的唯一标识 id 的集合，一个实体可能存在于多个条款。
      - reference_edges: “实体列表”中的实体的关系列表。
        - source_name: 关系的源实体的名称。
        - target_name: 关系的目标实体的名称。
        - rel_type: 关系类型。
        - description: 关系描述。

    ## 处理规则
    遍历每个 KEY 的实体列表，应用如下规则：
    1. **同义词**
       - 识别“实体列表”中是否存在指代同一个医学或保险概念的不同名称（如："甲状腺癌Ⅰ期" 与 "甲状腺癌(I期)"）的实体，如果存在，则需要合并这些实体。
       - **合并策略**：
         - **名称(entity_name)**：保留表述更规范、包含括号等细节更完整的名称作为标准名。
         - **描述(description)**：保留信息量最丰富的那个描述。
         - **保险条款唯一标识的集合(clause_ids)**：保留 clause_ids 个数最多的那个实体的 clause_ids 作为合并后的实体的 clause_ids

    2. **结构性冗余处理**
       - 识别“打包型”实体（即一个实体名称中包含顿号、"及"、"和"等连接词，指代多个独立概念）。
       - **处理策略**：
         - **删除**“打包实体”。
         - 将“打包实体”**拆分**为多个原子实体。请根据打包实体的描述，将其**拆分**为多个原子实体。
         - **除外规则**：请参考“关系列表”中是否存在该“实体”的包含关系，如果当前疑似“打包实体”与“原子实体”之间已存在包含关系，需要将“打包实体”**保留**。

    ## 输出格式
       - 请仅输出处理后的实体列表，不要包含任何说明或 Markdown、JSON 代码块标记。
       - 请确保返回**合法的 JSON**。

    ######################
    -Example-
    ######################
    Example 1: 同义词

    Candidates: 
    {
      1001: {
          "identified_entities": [
              {"entity_name": "何杰金氏病(ANN ARBOR分期Ⅰ期)", "description": "相当于Ann Arbor分期方案Ⅰ期程度的何杰金氏病。", "clause_ids": "88,89"},
              {"entity_name": "何杰金氏病(Ⅰ期)", "description": "相当于Ann Arbor分期方案Ⅰ期程度的何杰金氏病。", "clause_ids": "88,89"}
          ],
          "reference_edges": [
              {"source_name": "恶性肿瘤——轻度", "target_name": "何杰金氏病(ANN ARBOR分期Ⅰ期)", "rel_type": "INCLUDE", "description": "恶性肿瘤——轻度包含何杰金氏病(ANN ARBOR分期Ⅰ期)"},
              {"source_name": "恶性肿瘤——重度", "target_name": "何杰金氏病(ANN ARBOR分期Ⅰ期)", "rel_type": "NOT_INCLUDE", "description": "恶性肿瘤——重度不包含何杰金氏病(ANN ARBOR分期Ⅰ期)和何杰金氏病(Ⅰ期)"},
              {"source_name": "恶性肿瘤——轻度", "target_name": "何杰金氏病(Ⅰ期)", "rel_type": "INCLUDE", "description": "恶性肿瘤——轻度包含何杰金氏病(Ⅰ期)"},
              {"source_name": "恶性肿瘤——重度", "target_name": "何杰金氏病(Ⅰ期)", "rel_type": "NOT_INCLUDE", "description": "恶性肿瘤——重度不包含何杰金氏病(Ⅰ期)"},
          ]
      }
    }
    ################
    Output:
    {
      "1001": [
        {"entity_name": "何杰金氏病(ANN ARBOR分期Ⅰ期)","description": "相当于Ann Arbor分期方案Ⅰ期程度的何杰金氏病。","clause_ids": "88,89"}
      ]
    }
    ######################
    Example 2: 结构性冗余处理 (拆分打包)

    Candidates: 
    {
      1002: {
        "identified_entities": [
          {"entity_name": "肥胖症相关手术、袖状胃切除术（用于治疗糖尿病时除外）、整形手术、美容或整容手术、变性手术及前述手术的并发症或因前述手术导致的医疗事故。","description": "肥胖症相关手术、袖状胃切除术（用于治疗糖尿病时除外）、整形手术、美容或整容手术、变性手术及前述手术的并发症或因前述手术导致的医疗事故。","clause_ids": "29"},
          {"entity_name": "整形手术","description": "责任免除：整形手术。","clause_ids": "29"}
        ],
        "reference_edges": [
          {"source_name": "保险责任", "target_name": "肥胖症相关手术、袖状胃切除术（用于治疗糖尿病时除外）、整形手术、美容或整容手术、变性手术及前述手术的并发症或因前述手术导致的医疗事故。", "rel_type": "NOT_INCLUDE", "description": "保险责任不包含的相关治疗手术"},
          {"source_name": "保险责任", "target_name": "整形手术", "rel_type": "NOT_INCLUDE", "description": "保险责任不包含整形手术"},
        ]
      }
    }
    ################
    Output:
    { 
      "1002": [
        {"entity_name": "美容或整容手术","description": "责任免除：美容或整容手术。","clause_ids": "29"},
        {"entity_name": "肥胖症相关手术","description": "责任免除：肥胖症相关手术。","clause_ids": "29"},
        {"entity_name": "袖状胃切除术（用于治疗糖尿病时除外）","description": "责任免除：袖状胃切除术（用于治疗糖尿病时除外）。","clause_ids": "29"},
        {"entity_name": "变性手术","description": "责任免除：变性手术。","clause_ids": "29"},
        {"entity_name": "前述手术的并发症或因前述手术导致的医疗事故","description": "责任免除：前述手术的并发症或因前述手术导致的医疗事故。","clause_ids": "29"}
      ]
    }
    ######################
    -Real Data-
    ######################
    Candidates: {{ candidates }}
    ######################
    Output:

summarize_descriptions:
  name: "summarize_descriptions"
  version: "0.0.1"
  description: "Summarize descriptions of entities and relationships from text"
  template: |
    你是一个保险领域知识图谱构造专家，你的任务是从复杂的保险条款中提取核心逻辑，构建一个用于理赔推理的图谱。
    给定一个或两个实体，以及一个描述列表，所有描述都与同一个实体或一组实体相关。
    请将所有描述合并为一个全面的描述。确保包含从所有描述中收集的信息。
    如果提供的描述有矛盾，请解决矛盾并提供一个连贯的总结。
    确保使用第三人称，并包含实体名称，以便我们拥有完整的上下文。

    ########
    -Data-
    Entities: {entity_name}
    Description List: {description_list}
    ########