insurance_extraction:
  name: "insurance_extraction"
  version: "1.1.0"
  description: "extract missing insurance fields from text"
  template: |
    你是保险合同信息提取专家。请从文本中提取以下缺失字段。

    缺失字段：
    {{ fields }}

    文本内容：
    {{ content }}

    要求：
    1. 只返回缺失字段的提取结果，保持与缺失字段相同的 JSON 结构
    2. 如果字段无法确定，设为 null
    3. 金额转为数字（如 2284，不带单位）
    4. 日期格式为 YYYY-MM-DD
    5. 直接返回 JSON，不要包裹在代码块中

    示例：若缺失字段为 {"cvg_premium": [{"条款名称": "", "保险费（元）": ""}]}，
    则返回：{"cvg_premium": [{"条款名称": "个人癌症医疗保险", "保险费（元）": 2284}]}
