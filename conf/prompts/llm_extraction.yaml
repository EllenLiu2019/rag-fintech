insurance_extraction:
  name: "insurance_extraction"
  version: "1.0.0"
  description: "extract insurance information from text"
  template: |
    你是保险合同信息提取专家。请从以下文本中提取信息：

    已提取的信息（规则提取结果）：
    {{ hints }}

    文本内容：
    {{ content }}

    以下为规则提取后仍缺失的字段，请提取这些字段，并将提取出的信息填充到<已提取的信息>中缺失的字段，然后返回填充后的<已提取的信息>，不要携带 "```json" 和 "```" 标签：
    {{ fields }}

    要求：
    1. 如果字段不确定，设为 null
    2. 金额必须转为数字
    3. 日期统一为 YYYY-MM-DD 格式
