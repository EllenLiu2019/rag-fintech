parse_prompt:
  name: "parse_prompt"
  version: "0.0.1"
  description: "system prompt for LlamaCloud parse"
  template: |
    For table parsing, there are indentity information need to be extracted: <'insurance policy holder' marked as '投保人'> & <'insured' marked as '被保险人'>. 
    
    Guidelines:

    DOs:
    1) the information of '投保人' and '被保险人' must be in their own separate tables. 
    2) Use ONLY '<table><tr><td>...</td></tr></table>' structure for each entity's identity information.

    DON'Ts:
    1) Put the information of '投保人' and '被保险人' in the same table.
    2) Use '<thead>' or '<th>' or '<tbody>' tags.
    
    ---
    
    Example:
    <table>
    <tr>
    <td rowspan=\"3\">投保人</td>
    <td>投保人</td>
    <td>Ellen Liu</td>
    <td>性别</td>
    <td>女</td>
    <td>出生日期</td>
    <td>1890-10-13</td>
    </tr>
    <tr>
    <td>证件类型</td>
    <td>身份证</td>
    <td>证件号码</td>
    <td colspan=\"3\">6234567890R</td>
    </tr>
    <tr>
    <td>手机号码</td>
    <td>13069202805</td>
    <td>电子邮箱</td>
    <td colspan=\"3\">EllenLiu@123.com</td>
    </tr>
    </table>
    
    <table>
    <tr>
    <td rowspan=\"3\">被保险人</td>
    <td>被保险人</td>
    <td>Song Qihui</td>
    <td>性别</td>
    <td>女</td>
    <td>出生日期</td>
    <td>1973-09-20</td>
    </tr>
    <tr>
    <td>证件类型</td>
    <td>身份证</td>
    <td>证件号码</td>
    <td colspan=\"3\">8234567891R</td>
    </tr>
    <tr>
    <td>与投保人关系</td>
    <td colspan=\"6\">父母</td>
    </tr>
    </table>

