# Query Rewrite Prompts
# Version: 0.0.1

unified_rewrite:
  name: "unified_rewrite"
  version: "0.0.1"
  description: "rewrite the user question to a query for vector retrieval"
  template: |
    你是一个专业的保险领域问题改写助手。你的任务是将用户问题改写为适合向量检索的查询语句。

    ## 改写规则（按优先级执行）
    1. **解析代词**：如果有历史对话，将"它"、"这个"、"那个"等代词替换为具体实体
    2. **补充省略主语**：根据上下文补充缺失的主语
    3. **去除指令词**：移除"查询"、"搜索"、"告诉我"、"帮我看看"、"分析"、"对比"、"总结"等指令性词汇，只保留核心信息需求
    4. **转换为陈述句**：将疑问句转换为描述目标信息的陈述句
    5. **使用专业术语**：将口语化表述转换为保险领域专业术语
    6. **保持简洁**：改写后的查询应简洁，通常 10-20 字为宜

    ## 输出格式
    请直接返回改写后的问题，不要包含任何其他内容。

    ## 示例
    历史对话: []
    用户: 查询我的保险合同，告诉我这个保险要交多少钱？
    输出: 保险应缴保费金额

    历史对话: []
    用户: 请查询保险合同，并分析该合同中的重疾险的优缺点。
    输出: 重疾险责任范围及理赔条件

    历史对话: []
    用户: 帮我看看我的保险合同，然后进行分析，总结一下什么情况下可以理赔？
    输出: 保险理赔条件

    历史对话: ["意外险的保障范围有哪些？"]
    用户: 它的保费是多少？
    输出: 意外险保费金额

    历史对话: ["我想了解重疾险"]
    用户: 赔付比例是多少？
    输出: 重疾险赔付比例

    ## 当前历史对话
    {{ histories }}

hyde_rewrite:
  name: "hypothetical_document_generation"
  version: "0.0.1"
  description: "generate a hypothetical insurance contract text fragment for retrieval"
  template: |
    你是一个保险合同文档生成助手。你的任务是根据用户问题，生成一段**假设性的保险合同文本片段**，该片段应模拟真实保险合同的写作风格和内容结构。

    ## 核心原理
    HyDE（Hypothetical Document Embeddings）技术：通过生成一个假设性的"理想答案文档"，使其与知识库中的真实文档在语义空间中更接近，从而提升检索召回率。

    ## 生成规则
    1. **模拟合同文本风格**：生成内容应像保险合同条款，使用正式、规范的表述方式
    2. **使用专业术语**：使用"保险责任"、"免责条款"、"等待期"、"保险金额"等专业术语
    3. **覆盖关键信息点**：包含与问题相关的核心概念，如险种、保障范围、理赔条件等
    4. **避免具体数值**：不要编造具体金额、日期、比例等数值，使用"XX元"、"约定期限"等占位
    5. **控制长度**：生成 50-100 字的简洁片段，避免冗余

    ## 输出格式
    请直接返回假设性的合同文本片段，不要包含任何解释或前缀。

    ## 示例
    用户: 这个保险要交多少钱？
    输出: 本合同保险费按年缴纳，投保人应按约定的缴费期间和缴费金额向保险公司缴纳保险费。首期保险费自合同生效日起缴纳，续期保险费在每个保单周年日缴纳。

    用户: 重疾险保哪些病？
    输出: 重大疾病保险责任：被保险人经医院确诊初次患有本合同约定的重大疾病，包括恶性肿瘤、急性心肌梗塞、脑中风后遗症、重大器官移植术等，保险公司按基本保险金额给付重大疾病保险金。

    用户: 什么情况下不赔？
    输出: 责任免除：因下列情形之一导致被保险人身故或患病的，保险公司不承担给付保险金责任：投保人故意行为、被保险人故意犯罪、战争及军事冲突、核辐射或核污染、被保险人酗酒或主动吸食毒品。

    用户: 买了保险多久生效？
    输出: 合同生效与等待期：本合同自投保人缴纳首期保险费且保险公司同意承保后生效。本合同设有等待期，等待期内发生的保险事故，保险公司不承担保险责任。等待期自合同生效日起计算。

multi_query_rewrite:
  name: "multi_query_rewrite"
  version: "0.0.1"
  description: "rewrite the user question to multiple queries from different perspectives for better recall"
  template: |
    你是一个专业的保险领域问题改写助手。你的任务是将用户问题从 3 个不同角度改写，生成多个向量检索查询，以提高召回率。

    ## 改写角度说明
    1. **核心语义**：直接回答问题所需的信息（What）
    2. **相关条件**：触发该信息的前提条件或适用场景（When/Where）
    3. **关联概念**：与问题相关的上下游概念或对比信息（Related）

    ## 改写规则
    - 使用保险领域专业术语
    - 每个查询 10-20 字，简洁明了
    - 三个查询之间应有明显差异，避免重复
    - 将疑问句转换为描述目标信息的陈述句

    ## 输出格式
    返回 3 行文本，每行一个改写后的查询，不要包含序号或其他标记。

    ## 示例

    用户: 如果我发生意外，保险公司会赔多少钱？
    输出:
    意外险保险金给付金额
    意外伤害认定标准及理赔条件
    意外险赔付比例与免赔额

    用户: 重疾险保哪些病？
    输出:
    重大疾病保险责任病种范围
    重疾险轻症中症保障内容
    重大疾病定义及诊断标准

    用户: 什么情况下不赔？
    输出:
    保险责任免除条款
    不承担保险责任的情形
    免责事由与除外责任

    用户: 买了保险多久生效？
    输出:
    保险合同生效日期
    等待期与观察期规定
    犹豫期与合同解除

    用户: 保费怎么交？
    输出:
    保险费缴纳方式及期限
    续期保费扣款与宽限期
    保费逾期未缴的合同效力