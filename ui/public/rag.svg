<svg width="240" height="240" viewBox="0 0 240 240"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Triangle gradient -->
    <linearGradient id="triangleGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#06396A" />
      <stop offset="40%" stop-color="#1E5A96" />
      <stop offset="75%" stop-color="#4C8AC8" />
      <stop offset="100%" stop-color="#A8D8FF" />
    </linearGradient>

    <!-- Inner shadow -->
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dx="0" dy="1"/>
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#000000" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feComposite in="SourceGraphic"/>
    </filter>

    <!-- Highlight -->
    <linearGradient id="highlightGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.40"/>
      <stop offset="30%" stop-opacity="0.05"/>
      <stop offset="100%" stop-opacity="0"/>
    </linearGradient>

    <!-- Bars -->
    <linearGradient id="gradBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5EF2C2"/>
      <stop offset="100%" stop-color="#2F9E83"/>
    </linearGradient>

    <!-- Curve gradient -->
    <linearGradient id="gradCurve" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A8FFE9"/>
      <stop offset="100%" stop-color="#62E2C9"/>
    </linearGradient>
  </defs>

  <!-- Triangle -->
  <polygon points="120,30 210,195 30,195"
           fill="url(#triangleGrad)"
           stroke="#0C4F8A"
           stroke-width="4"
           filter="url(#innerShadow)"
           stroke-linejoin="round"/>

  <!-- Highlight -->
  <polygon points="120,30 210,195 30,195"
           fill="url(#highlightGrad)"
           opacity="0.6"/>

  <!-- Bars with animation -->
  <rect x="95" y="168" width="12" height="0" rx="2"
        fill="url(#gradBar)" opacity="0.70">
    <animate attributeName="height" from="0" to="28"
             dur="1.2s" begin="0.2s" fill="freeze" repeatCount="indefinite"/>
    <animate attributeName="y" from="168" to="140"
             dur="1.2s" begin="0.2s" fill="freeze" repeatCount="indefinite"/>
  </rect>

  <rect x="115" y="168" width="12" height="0" rx="2"
        fill="url(#gradBar)" opacity="0.85">
    <animate attributeName="height" from="0" to="43"
             dur="1.2s" begin="0.35s" fill="freeze" repeatCount="indefinite"/>
    <animate attributeName="y" from="168" to="125"
             dur="1.2s" begin="0.35s" fill="freeze" repeatCount="indefinite"/>
  </rect>

  <rect x="135" y="168" width="12" height="0" rx="2"
        fill="url(#gradBar)" opacity="1">
    <animate attributeName="height" from="0" to="63"
             dur="1.2s" begin="0.5s" fill="freeze" repeatCount="indefinite"/>
    <animate attributeName="y" from="168" to="105"
             dur="1.2s" begin="0.5s" fill="freeze" repeatCount="indefinite"/>
  </rect>

  <!-- Growth Curve with stroke animation -->
  <path id="curvePath"
        d="M90 150 C 110 130, 130 120, 165 110"
        fill="none"
        stroke="url(#gradCurve)"
        stroke-width="4"
        stroke-linecap="round"
        stroke-dasharray="120"
        stroke-dashoffset="120">
      <animate attributeName="stroke-dashoffset"
               from="120" to="0"
               dur="1.4s" begin="0.3s"
               repeatCount="indefinite"/>
  </path>

</svg>
