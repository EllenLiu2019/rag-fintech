# ==============================================================================
# vLLM multi-GPU deployment on AutoDL (H20 96GB)
#
# Profiles:
#   35b   - Qwen3.5-35B-A3B-FP8   (MoE, single H20)
#   122b  - Qwen3.5-122B-A10B-FP8 (MoE, H20 × 2, tensor-parallel)
#
# Usage:
#   docker compose -f docker-compose.autodl.yml --profile 35b  up -d
#   docker compose -f docker-compose.autodl.yml --profile 122b up -d
#
# Prerequisites:
#   - AutoDL data disk mounted at /root/autodl-tmp
#   - mkdir -p /root/autodl-tmp/huggingface
# ==============================================================================

x-common: &common
  image: vllm/vllm-openai:latest
  restart: unless-stopped
  ipc: host
  volumes:
    - /root/autodl-tmp/huggingface:/root/.cache/huggingface
  environment:
    - HF_HOME=/root/.cache/huggingface
    - HF_ENDPOINT=https://hf-mirror.com
    - VLLM_WORKER_MULTIPROC_METHOD=spawn

services:
  vllm-35b:
    <<: *common
    container_name: vllm-35b
    profiles: ["35b"]
    ports:
      - "8000:8000"
    command: >
      --model Qwen/Qwen3.5-35B-A3B-FP8
      --port 8000
      --max-model-len 32768
      --gpu-memory-utilization 0.90
      --dtype auto
      --kv-cache-dtype fp8
      --enable-auto-tool-choice
      --tool-call-parser hermes
      --reasoning-parser qwen3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  vllm-122b:
    <<: *common
    container_name: vllm-122b
    profiles: ["122b"]
    ports:
      - "8000:8000"
    command: >
      --model Qwen/Qwen3.5-122B-A10B-FP8
      --port 8000
      --tensor-parallel-size 2
      --max-model-len 32768
      --gpu-memory-utilization 0.90
      --dtype auto
      --kv-cache-dtype fp8
      --enable-auto-tool-choice
      --tool-call-parser hermes
      --reasoning-parser qwen3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
