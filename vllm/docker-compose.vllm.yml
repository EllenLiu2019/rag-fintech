# ==============================================================================
# vLLM deployment for AWS EC2 GPU instance
# Prerequisites:
#   - /dev/nvme1n1 mounted at /data  (232 GB data disk)
#   - sudo mkdir -p /data/huggingface && sudo chmod 777 /data/huggingface
# Usage: docker compose -f docker-compose.vllm.yml up -d
# ==============================================================================

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-server
    restart: unless-stopped
    # vLLM container runs as root (default). Cannot use `user: 1000` because
    # PyTorch calls getpass.getuser() which requires a /etc/passwd entry.
    ports:
      - "8000:8000"
    volumes:
      # Bind-mount the host data disk so models are stored on /data (232 GB nvme1n1),
      # not on the 30 GB root volume. The cache persists across container restarts
      # and docker image upgrades.
      - /data/huggingface:/root/.cache/huggingface
    environment:
      - HF_HOME=/root/.cache/huggingface
      # Optional: set API key for authentication (recommended when exposed to public)
      # - VLLM_API_KEY=${VLLM_API_KEY:-}
    command: >
      --model Qwen/Qwen3-32B-AWQ
      --port 8000
      --max-model-len 12000
      --gpu-memory-utilization 0.9
      --quantization awq
      --reasoning-parser qwen3
      --dtype auto
      --enforce-eager
      --kv-cache-dtype fp8
      --enable-auto-tool-choice
      --tool-call-parser hermes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s  # vLLM model loading takes time

